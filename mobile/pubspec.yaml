name: app
description: "Salawat counter app - Pray for the Prophet Muhammad ﷺ"
publish_to: 'none'
version: 1.0.1+9

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Phase 1 / 2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Phase 3
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  cloud_functions: ^5.1.4
  # App Check binds every Cloud Function call to a verified instance of
  # the app via Play Integrity, so a leaked Web API key can't be used to
  # hammer incrementCount from outside the app. Debug builds use a debug
  # token registered via the Firebase Console.
  firebase_app_check: ^0.3.2
  uuid: ^4.5.1

  # Phase 6 polish
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  share_plus: ^10.1.2
  # Tells the home-screen ping dot to flip to red the moment the device
  # drops WiFi/cellular, instead of waiting for the next polling fetch
  # to fail.
  connectivity_plus: ^6.0.5

  # Notifications come from FCM (server → topic → device). flutter_local_
  # notifications is kept only for displaying foreground messages, since
  # Android by design doesn't auto-display FCM notifications while the
  # app owns the screen. timezone/flutter_timezone stay because the
  # countdown widget still needs them.
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.1.1

  # Native splash. Used at runtime for preserve()/remove() so it can stay
  # on-screen until anonymous sign-in resolves.
  flutter_native_splash: ^2.4.4

  # Will be wired in later phases:
  # firebase_messaging, lucide_icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # One-shot tooling: regenerate Android launcher icons from a single
  # source PNG (assets/icon/app_icon.png). Run after editing the source:
  #   dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#065F46"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/app_icon_circle.png"
  android: true
  ios: false
  android_12:
    color: "#FFFFFF"
    image: "assets/icon/app_icon_circle.png"

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/icon/
