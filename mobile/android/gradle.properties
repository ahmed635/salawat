org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Jetifier was for migrating old support-library refs to AndroidX. This
# project is already AndroidX, so the transform is dead weight — and it
# breaks on dependencies compiled for Java 21+ (class file major version
# 65), e.g. bcprov-jdk18on-1.80 pulled in transitively by firebase_auth.
android.enableJetifier=false
